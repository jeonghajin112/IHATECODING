<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/main.css" />
    <title>IHATECODING Rust Preview</title>
    <script type="module" src="/assets/main.js" defer></script>
  </head>
  <body>
    <main id="app" class="shell" data-workspace-view="empty">
      <aside class="project-sidebar" aria-label="프로젝트">
        <div class="sidebar-brand">
          <span class="brand-mark" aria-hidden="true">I</span>
          <span>
            <strong>IHATECODING</strong>
            <small>RUST PREVIEW</small>
          </span>
        </div>

        <div class="project-section-heading">
          <span>프로젝트</span>
          <span id="project-count">0</span>
        </div>
        <nav id="project-list" class="project-list" aria-label="저장된 프로젝트"></nav>
        <button id="create-project" class="create-project" type="button" disabled>＋ 새 프로젝트</button>
      </aside>

      <section class="main-shell">
        <nav class="workspace-tabs" aria-label="작업 탭">
          <div id="workspace-tab-list" class="workspace-tab-list"></div>
          <button
            id="add-workspace-tab"
            class="add-workspace-tab"
            type="button"
            title="빈 탭 열기"
            aria-label="빈 탭 열기"
            disabled
          >
            ＋
          </button>
        </nav>

        <header class="toolbar">
          <button id="add-terminal" class="toolbar-action toolbar-action-primary" type="button" disabled>
            ＋ PowerShell
          </button>
          <span class="current-label">CURRENT</span>
          <strong id="current-project" class="current-project">프로젝트 없음</strong>
          <span class="toolbar-spacer"></span>
          <button
            id="recover-project-catalog"
            class="toolbar-action"
            type="button"
            disabled
            hidden
          >
            백업 복구
          </button>
          <button id="close-active-terminal" class="toolbar-action" type="button" disabled>
            현재 창 닫기
          </button>
          <button id="toggle-browser" class="toolbar-action" type="button">
            브라우저 PoC
          </button>
        </header>

        <section id="workspace-stage" class="workspace-stage">
          <section id="blank-tab-surface" class="blank-tab-surface" aria-label="빈 작업 탭">
            <span class="empty-glyph">＋</span>
            <strong>빈 탭입니다</strong>
            <span>왼쪽에서 프로젝트를 선택하면 이 탭에 프로젝트가 열립니다.</span>
          </section>

          <section
            id="terminal-surface"
            class="terminal-grid"
            aria-label="Rust ConPTY PowerShell 작업 공간"
          >
            <div id="empty-workspace" class="empty-workspace">
              <span class="empty-glyph">&gt;_</span>
              <strong>열려 있는 PowerShell이 없습니다</strong>
              <span>＋ PowerShell을 눌러 이 프로젝트에 터미널을 추가하세요.</span>
            </div>
          </section>

          <section id="browser-surface" class="browser-surface" aria-label="브라우저 PoC">
            <div class="browser-placeholder">
              <strong>격리된 브라우저 WebView</strong>
              <span>터미널은 뒤에서 계속 실행됩니다.</span>
            </div>
          </section>
        </section>

        <footer class="statusbar">
          <span class="backend">RUST · ConPTY</span>
          <span id="session-count" class="session-count">0 / 20</span>
          <span class="status-separator" aria-hidden="true"></span>
          <span id="status" role="status" aria-live="polite" aria-atomic="true">
            프로젝트를 불러오는 중…
          </span>
        </footer>
      </section>

      <dialog id="project-dialog" class="project-dialog" aria-labelledby="project-dialog-title">
        <form id="project-form" method="dialog">
          <div class="dialog-heading">
            <strong id="project-dialog-title">새 프로젝트</strong>
            <span>프로젝트 폴더는 실제 절대 경로로 입력하세요.</span>
          </div>
          <label>
            <span>이름</span>
            <input id="project-name" name="project-name" maxlength="50" autocomplete="off" required />
          </label>
          <label>
            <span>폴더 경로</span>
            <input
              id="project-path"
              name="project-path"
              placeholder="C:\Users\name\Documents\project"
              autocomplete="off"
              spellcheck="false"
              required
            />
          </label>
          <p id="project-form-error" class="project-form-error" role="alert"></p>
          <div class="dialog-actions">
            <button id="cancel-project" type="button">취소</button>
            <button class="dialog-submit" type="submit">프로젝트 만들기</button>
          </div>
        </form>
      </dialog>
    </main>
  </body>
</html>
